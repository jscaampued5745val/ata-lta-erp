<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ATA &amp; LTA Accounting Firm ERP</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <!-- Login Screen -->
  <div id="login-screen">
    <div class="login-card">
      <h1>ATA &amp; LTA ERP</h1>
      <p class="login-subtitle">Accounting Firm Management System</p>
      <form id="login-form" class="form-stacked">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" required placeholder="user@ata-lta.com">
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" required placeholder="Enter password">
        </div>
        <button type="submit" class="btn btn-primary btn-block">Sign In</button>
      </form>
      <div id="login-error" class="login-error hidden"></div>
    </div>
  </div>

  <!-- App Shell (hidden by default) -->
  <div id="app-shell" class="hidden">
    <header class="app-header">
      <div class="header-brand">
        <span class="logo">ATA &amp; LTA ERP</span>
      </div>
      <div class="header-actions">
        <div class="entity-pill">
          <select id="entity-switcher" class="form-select pill-select">
            <option value="ATA">ATA Accounting</option>
            <option value="LTA">LTA Accounting</option>
          </select>
          <span id="entity-badge" class="badge"></span>
        </div>
        <div class="user-chip">
          <span id="user-avatar" class="avatar"></span>
          <span id="user-name" class="user-name">User</span>
          <button id="logout-btn" class="btn btn-ghost btn-sm">Logout</button>
        </div>
      </div>
      <button id="menu-toggle" class="menu-toggle" aria-label="Toggle menu">
        <span></span><span></span><span></span>
      </button>
    </header>

    <div class="app-layout">
      <nav id="sidebar" class="sidebar">
        <ul class="nav-list">
          <li><a href="#dashboard" data-module="dashboard">Dashboard</a></li>
          <li><a href="#clients" data-module="clients">Client List</a></li>
          <li><a href="#operations" data-module="operations">Operations</a></li>
          <li><a href="#billing" data-module="billing">Billing</a></li>
          <li><a href="#disbursement" data-module="disbursement">Disbursement</a></li>
          <li><a href="#transmittal" data-module="transmittal">Transmittal</a></li>
          <li><a href="#reports" data-module="reports">Reports</a></li>
          <li><a href="#admin" data-module="admin">Admin</a></li>
        </ul>
      </nav>

      <main id="content" class="content"></main>
    </div>
  </div>

  <script src="js/utils.js"></script>
  <script src="js/datepicker.js"></script>
  <script src="js/data.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/dashboard.js"></script>
  <script src="js/clients.js"></script>
  <script src="js/workflow.js"></script>
  <script src="js/billing.js"></script>
  <script src="js/disbursement.js"></script>
  <script src="js/dms.js"></script>
  <script src="js/reports.js"></script>
  <script src="js/transmittal.js"></script>
  <script src="js/pendingChanges.js"></script>
  <script src="js/users.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
